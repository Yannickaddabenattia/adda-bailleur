name: adda_location
description: "ADDA Bailleur - Gestion locale de locations immobilières."
publish_to: 'none'
version: 1.1.0+10

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Stockage local chiffré
  flutter_secure_storage: ^9.2.4
  hive_ce: ^2.11.3
  hive_ce_flutter: ^2.3.1
  path_provider: ^2.1.5

  # State management
  provider: ^6.1.2

  # Utilitaires
  uuid: ^4.5.1
  crypto: ^3.0.6
  intl: ^0.20.2
  email_validator: ^3.0.0

  # États des lieux / photos / signatures
  signature: ^5.5.0
  image_picker: ^1.1.2
  image: ^4.5.4

  # PDF (quittances, états des lieux)
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.1.2

  # Envoi direct par e-mail avec pièce jointe (Android / iOS)
  flutter_email_sender: ^6.0.3

  # Sauvegarde chiffrée (export/import)
  pointycastle: ^3.9.1
  file_picker: ^8.1.7
  file_selector: ^1.0.3
  archive: ^4.0.2

  # QR code (preuve d'accord locataire par mailto:)
  qr_flutter: ^4.1.0

  # Graphiques (tableau de bord financier)
  fl_chart: ^0.69.0

  # Ouverture du client mail (mailto:)
  url_launcher: ^6.3.1

  # Ajout d'événements au calendrier natif iOS / Android / macOS
  add_2_calendar: ^3.0.1

  # Export comptabilité CSV
  csv: ^6.0.0
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.9.2
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.4
  msix: ^3.17.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/legal/fr/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_square.png
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/logo_adaptive_fg.png
  remove_alpha_ios: true
  macos:
    generate: true
    image_path: assets/images/logo_square.png

flutter_native_splash:
  color: "#1E3A8A"
  image: assets/images/logo_square.png
  android: true
  ios: true
  fullscreen: false
  android_12:
    color: "#1E3A8A"
    image: assets/images/logo_square.png

# ─────────────────────────────────────────────────────────────────────────
# Microsoft Store (packaging MSIX)
# Build : sur Windows uniquement →  dart run msix:create --store
# (lancé automatiquement par la CI .github/workflows/build-windows-store.yml)
#
# Les 3 valeurs d'identité ci-dessous proviennent de Partner Center
#   (produit ADDA Bailleur → Gestion des produits → Identité du produit) :
#     identity_name           = Package/Identity/Name
#     publisher               = Package/Identity/Publisher (CN=...)
#     publisher_display_name  = Package/Properties/PublisherDisplayName
# Store ID : 9PLXG3DS5KXD  —  https://apps.microsoft.com/detail/9PLXG3DS5KXD
# ─────────────────────────────────────────────────────────────────────────
msix_config:
  display_name: ADDA Bailleur
  publisher_display_name: "ADDA BENATTIA"
  identity_name: "ADDABENATTIA.ADDABailleur"
  publisher: "CN=6C9AE533-E8BE-4BA8-B763-E570011DB53E"
  msix_version: 1.1.0.0
  logo_path: assets/images/logo_square.png
  languages: fr-FR
  store: true
