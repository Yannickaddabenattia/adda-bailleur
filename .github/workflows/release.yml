name: Build & Release (Linux)

# La distribution GitHub Releases est réservée à la version LINUX.
# (Android → Google Play, iOS → App Store ; non publiés ici.)
#
# Déclenché en poussant un tag de version (ex. `git tag v1.1.0 && git push --tags`)
# ou manuellement (onglet Actions → Run workflow). Sur un tag, le bundle Linux
# est publié automatiquement dans GitHub Releases.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.6'

jobs:
  linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libcups2-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package bundle (tar.gz)
        run: tar -czf adda-bailleur-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: adda-bailleur-linux-x64.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release (Linux)
    needs: [linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: dist
      - name: Rename with version tag
        run: |
          mv dist/adda-bailleur-linux-x64.tar.gz \
             "dist/adda-bailleur-${{ github.ref_name }}-linux-x64.tar.gz"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
