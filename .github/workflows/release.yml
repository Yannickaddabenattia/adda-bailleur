name: Build & Release (Linux)

# La distribution GitHub Releases est réservée à la version LINUX.
# (Android → Google Play, iOS → App Store ; non publiés ici.)
#
# Déclenchement :
#   - en poussant un tag de version :  git tag v1.1.1 && git push origin v1.1.1
#   - ou manuellement : onglet Actions → "Build & Release (Linux)" → Run workflow
#     (champ "version" optionnel ; sinon la version est lue dans pubspec.yaml).
#
# Produit ET publie deux fichiers, identiques en nom/structure à la 1.0.0 :
#   - adda-bailleur_<version>_amd64.deb         (paquet Debian/Ubuntu)
#   - adda-bailleur-<version>-linux-x64.tar.gz  (archive portable)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version à publier (ex. 1.1.1). Vide = lue dans pubspec.yaml."
        required: false
        default: ''

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.6'

jobs:
  release-linux:
    name: Build & Release Linux x64
    # ⚠️ Compilé sur Ubuntu 22.04 (GLIBC 2.35) volontairement : un binaire compilé
    # sur une Ubuntu plus récente (ex. 24.04) refuse de démarrer sur les distros
    # basées 22.04 (Zorin 17, Mint 21, Debian 12…) → « GLIBC_2.x not found ».
    # Compiler sur 22.04 garantit la compatibilité descendante (22.04 et +).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libcups2-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Compute version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(grep '^version:' pubspec.yaml | head -1 | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Version à publier : $V"

      - name: Package .tar.gz (dossier adda-bailleur-<version>/)
        run: |
          V="${{ steps.ver.outputs.version }}"
          mkdir -p dist "adda-bailleur-${V}"
          cp -a build/linux/x64/release/bundle/. "adda-bailleur-${V}/"
          chmod +x "adda-bailleur-${V}/adda_location"
          tar -czf "dist/adda-bailleur-${V}-linux-x64.tar.gz" "adda-bailleur-${V}"

      - name: Package .deb (structure identique à la 1.0.0)
        run: |
          V="${{ steps.ver.outputs.version }}"
          PKG="${RUNNER_TEMP}/pkgroot"
          rm -rf "$PKG"
          # 1) Application dans /opt/adda-bailleur
          mkdir -p "$PKG/opt/adda-bailleur"
          cp -a build/linux/x64/release/bundle/. "$PKG/opt/adda-bailleur/"
          chmod +x "$PKG/opt/adda-bailleur/adda_location"
          # 2) Entrée de bureau (.desktop) — Exec en chemin absolu
          mkdir -p "$PKG/usr/share/applications"
          sed 's#^Exec=adda_location#Exec=/opt/adda-bailleur/adda_location#' \
            linux/adda-bailleur.desktop > "$PKG/usr/share/applications/adda-bailleur.desktop"
          # 3) Icône (256x256)
          mkdir -p "$PKG/usr/share/icons/hicolor/256x256/apps"
          cp assets/images/logo_square.png \
            "$PKG/usr/share/icons/hicolor/256x256/apps/adda-bailleur.png"
          # 4) Métadonnées Debian (control + postinst) — construites via printf (robuste)
          mkdir -p "$PKG/DEBIAN"
          printf 'Package: adda-bailleur\nVersion: %s\nArchitecture: amd64\nMaintainer: Yannick ADDA BENATTIA <contact@addabailleur.fr>\nSection: utils\nPriority: optional\nDepends: libgtk-3-0, libblkid1, liblzma5, libsecret-1-0\nDescription: ADDA Bailleur - Gestion locative 100%% locale et chiffree\n .\n Application de gestion locative pour les bailleurs particuliers,\n conforme a la loi ALUR et a la fiscalite francaise 2026.\n' "$V" > "$PKG/DEBIAN/control"
          printf '#!/bin/sh\nset -e\nchmod +x /opt/adda-bailleur/adda_location\nexit 0\n' > "$PKG/DEBIAN/postinst"
          chmod 0755 "$PKG/DEBIAN/postinst"
          dpkg-deb --build --root-owner-group "$PKG" "dist/adda-bailleur_${V}_amd64.deb"

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: ADDA Bailleur ${{ steps.ver.outputs.version }} — Linux
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
